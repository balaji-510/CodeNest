services:
  - type: web
    name: codenest-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn codenest_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"   # update after Vercel deploy
      - key: DATABASE_URL
        fromDatabase:
          name: codenest-db
          property: connectionString
      - key: TEACHER_REGISTRATION_CODE
        value: "TEACHER2024"
      # Add these manually in Render dashboard:
      # EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, GROQ_API_KEY

databases:
  - name: codenest-db
    databaseName: codenest
    user: codenest
    plan: free
