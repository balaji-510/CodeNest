services:
  # Backend Web Service
  - type: web
    name: codenest-backend
    runtime: python
    buildCommand: "./codenest_backend/build.sh"
    startCommand: "cd codenest_backend && gunicorn codenest_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DJANGO_SETTINGS_MODULE
        value: codenest_backend.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: codenest-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TEACHER_REGISTRATION_CODE
        value: TEACHER2024

  # Frontend Static Site
  - type: web
    name: codenest-frontend
    runtime: static
    buildCommand: "cd CodeNest/project2 && npm install && npm run build"
    staticPublishPath: ./CodeNest/project2/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_ENABLE_CONTESTS
        value: true
      - key: VITE_ENABLE_DISCUSSIONS
        value: true

databases:
  - name: codenest-db
    databaseName: codenest
    user: codenest
